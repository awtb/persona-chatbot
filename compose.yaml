services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    command: ["uv", "run", "make", "prod"]
    ports:
      - ${SERVING_PORT:-8000}:${SERVING_PORT:-8000}
    environment:
      DB_USER: ${DB_USER:-persona_chatbot}
      DB_PASSWORD: ${DB_PASSWORD:-persona_chatbot}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-persona_chatbot}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVING_HOST: ${SERVING_HOST:-0.0.0.0}
      SERVING_PORT: ${SERVING_PORT:-8000}
      SERVING_WORKERS_COUNT: ${SERVING_WORKERS_COUNT:-1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_HASHING_ALGORITHM: ${JWT_HASHING_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRATION_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:-80}
      LOGGING_MODE: ${LOGGING_MODE:-plain}
      LOGGING_LVL: ${LOGGING_LVL:-}
      SERVICE_NAME: ${SERVICE_NAME:-persona-chatbot}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-}
  db:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-persona_chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-persona_chatbot}
      POSTGRES_DB: ${POSTGRES_DB:-persona_chatbot}
  redis:
    image: redis:8-alpine

volumes:
  pgdata:
