services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    command: ["make", "api-prod"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SERVING_PORT:-8000}/internal/healthcheck > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - ${SERVING_PORT:-8000}:${SERVING_PORT:-8000}
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      SERVING_HOST: ${SERVING_HOST:-0.0.0.0}
      SERVING_PORT: ${SERVING_PORT:-8000}
      SERVING_PROCESSES_COUNT: ${SERVING_PROCESSES_COUNT:-1}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_BOT_WEBHOOK_URL: ${TG_BOT_WEBHOOK_URL}
      TG_BOT_WEBHOOK_TOKEN: ${TG_BOT_WEBHOOK_TOKEN}
      LOGGING_MODE: ${LOGGING_MODE:-structured}
      LOGGING_LVL: ${LOGGING_LVL:-INFO}
      SERVICE_NAME: ${SERVICE_NAME:-persona-chatbot-api}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-}
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: ["make", "worker-prod"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WORKER_PORT:-8001}/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      DB_USER: ${DB_USER:-persona_chatbot}
      DB_PASSWORD: ${DB_PASSWORD:-persona_chatbot}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-persona_chatbot}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      WORKER_HOST: ${WORKER_HOST:-0.0.0.0}
      WORKER_PORT: ${WORKER_PORT:-8001}
      WORKER_PROCESSES_COUNT: ${WORKER_PROCESSES_COUNT:-1}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      LLM_PROVIDER_API_KEY: ${LLM_PROVIDER_API_KEY:-ollama}
      LLM_PROVIDER_BASE_URL: ${LLM_PROVIDER_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      TELEGRAM_UPDATES_MAX_WORKERS: ${TELEGRAM_UPDATES_MAX_WORKERS:-12}
      MEMORY_EXTRACT_MAX_WORKERS: ${MEMORY_EXTRACT_MAX_WORKERS:-4}
      LOGGING_MODE: ${LOGGING_MODE:-structured}
      LOGGING_LVL: ${LOGGING_LVL:-INFO}
      SERVICE_NAME: ${SERVICE_NAME:-persona-chatbot-worker}
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["seed"]
    depends_on:
      db:
        condition: service_started
    command: ["make", "seed-prod"]
    environment:
      DB_USER: ${DB_USER:-persona_chatbot}
      DB_PASSWORD: ${DB_PASSWORD:-persona_chatbot}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-persona_chatbot}
      LOGGING_MODE: ${LOGGING_MODE:-structured}
      LOGGING_LVL: ${LOGGING_LVL:-INFO}
      SERVICE_NAME: ${SERVICE_NAME:-persona-chatbot-seed}
  db:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-persona_chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-persona_chatbot}
      POSTGRES_DB: ${POSTGRES_DB:-persona_chatbot}
  redis:
    image: redis:8-alpine

volumes:
  pgdata:
